<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMG</title>
    <link rel="stylesheet" href="../Css/uy.css">
</head>
<body>

    <div class="content-center">
        
        <div class="bloque-contenido">
            <h1>OMG HOLAAAAAAAAAAAA</h1>
            <h3>Gracias por llegar hasta aquí, ¡ahora mira a un perrito! :D</h3>
            
            <img src="../Multimedia/chucho.png" alt="Chucho" class="img-neon">
        </div>

    </div>

    <script>
        const imgs = document.querySelectorAll('.img-neon');
        
        const checkScroll = () => {
            imgs.forEach(img => {
                const top = img.getBoundingClientRect().top;
                if (top < window.innerHeight - 100) {
                    img.classList.add('show');
                }
            });
        };

        window.addEventListener('scroll', checkScroll);
        window.addEventListener('DOMContentLoaded', checkScroll);
    </script>
    
</body>
</html>
